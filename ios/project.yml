name: Loopline
options:
  bundleIdPrefix: black.dominican
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"

targets:
  Loopline:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Loopline
    info:
      path: Loopline/Info.plist
      properties:
        CFBundleDisplayName: Loopline
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIApplicationSupportsIndirectInputEvents: true
        UIRequiresFullScreen: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes:
          - audio
        NSMicrophoneUsageDescription: "Loopline usa el micrófono para enviar tu voz a la PC mientras el iPhone actúa como micrófono."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: black.dominican.loopline
        PRODUCT_NAME: Loopline
        GENERATE_INFOPLIST_FILE: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: "NO"
        SWIFT_EMIT_LOC_STRINGS: "YES"

schemes:
  Loopline:
    build:
      targets:
        Loopline: all
    run:
      config: Debug
    archive:
      config: Release
