<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Loopline app icon. Full-bleed 1024 square (iOS masks the corners). -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5B8DEF"/>
      <stop offset="0.45" stop-color="#5468FF"/>
      <stop offset="1" stop-color="#7A3FF2"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.32" r="0.85">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E9F0FF"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dy="10" result="o"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect width="1024" height="1024" fill="url(#glow)"/>

  <!-- Liquid-glass top sheen -->
  <path d="M0,0 H1024 V300 C760,420 264,420 0,300 Z" fill="#FFFFFF" opacity="0.10"/>

  <g filter="url(#soft)" fill="none" stroke="url(#stroke)" stroke-linecap="round" stroke-linejoin="round">
    <!-- The "line" that flows in as an audio wave, then closes into a "loop" -->
    <path d="M188,512
             C188,512 250,512 286,512
             C330,512 330,430 374,430
             C418,430 418,594 462,594
             C506,594 506,470 550,470"
          stroke-width="56"/>
    <!-- The loop: a continuous ring that the line feeds into -->
    <path d="M550,470
             C612,420 712,432 752,498
             C808,590 742,704 636,704
             C548,704 496,628 528,548
             C548,498 604,470 660,486"
          stroke-width="56"/>
  </g>

  <!-- Endpoint nodes (jack-style dots) -->
  <circle cx="188" cy="512" r="34" fill="url(#stroke)"/>
  <circle cx="660" cy="486" r="22" fill="#EAF0FF"/>
</svg>
